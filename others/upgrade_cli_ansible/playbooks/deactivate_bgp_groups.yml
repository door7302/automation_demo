---
# ==========================================================================
# deactivate_bgp_groups.yml
# Deactivate ("deactivate protocols bgp group <name>") every BGP group that
# is currently active. Already-deactivated groups and whitelisted groups are
# skipped. Deactivated groups are appended to a per-device state file.
#
#   ansible-playbook playbooks/deactivate_bgp_groups.yml \
#       -e '{"bgp_group_whitelist": ["CORE", "RR"]}'
# ==========================================================================
- name: Deactivate BGP groups
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    statefile: "{{ state_dir }}/{{ device_name }}/bgp_groups.json"
  tasks:

    - name: Retrieve committed configuration (set format)
      juniper.device.config:
        retrieve: committed
        format: set
        return_output: true
      register: cfg

    - name: Parse BGP groups
      ansible.builtin.set_fact:
        _all_groups: "{{ cfg.config | regex_findall('(?m)^set protocols bgp group (\\S+)') | unique }}"
        _deact_groups: "{{ cfg.config | regex_findall('(?m)^deactivate protocols bgp group (\\S+)\\s*$') | unique }}"

    - name: Compute groups to deactivate
      ansible.builtin.set_fact:
        target_groups: >-
          {{ _all_groups
             | difference(_deact_groups)
             | difference(bgp_group_whitelist)
             | list }}

    - name: Show what will be deactivated
      ansible.builtin.debug:
        msg: "{{ device_name }} | BGP groups to deactivate: {{ target_groups }}"

    - name: Deactivate the groups
      juniper.device.config:
        load: set
        lines: "{{ target_groups | map('regex_replace', '^(.+)$', 'deactivate protocols bgp group \\1') | list }}"
        commit: true
        comment: "Ansible deactivate_bgp_groups"
      when: target_groups | length > 0

    - name: Persist state (only when something was deactivated)
      when: target_groups | length > 0
      block:
        - name: Ensure state directory exists
          ansible.builtin.file:
            path: "{{ statefile | dirname }}"
            state: directory
            mode: "0755"
          delegate_to: localhost

        - name: Read previously saved list (if any)
          ansible.builtin.stat:
            path: "{{ statefile }}"
          register: st
          delegate_to: localhost

        - name: Merge and store the deactivated group list
          ansible.builtin.copy:
            content: "{{ ((lookup('file', statefile) | from_json) if st.stat.exists else []) | union(target_groups) | to_nice_json }}"
            dest: "{{ statefile }}"
            mode: "0644"
          delegate_to: localhost
