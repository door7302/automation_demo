---
# ==========================================================================
# diff_snapshots.yml
# Compare two snapshots captured with snapshot.yml (e.g. "before" vs "after")
# command-by-command and RAISE an error if any output differs. A unified
# diff is printed for every command that changed.
#
# Snapshots are read from:
#   <repo>/state/<device_name>/snapshots/<label>/<command>.txt
#
# Optional extra-vars:
#   before_label  : first snapshot label   (default "before")
#   after_label   : second snapshot label  (default "after")
#   commands_file : same command list used for the captures
#                   (default playbooks/snapshot_commands.txt)
#
# Examples:
#   ansible-playbook playbooks/diff_snapshots.yml
#   ansible-playbook playbooks/diff_snapshots.yml --limit router1 \
#     -e before_label=pre -e after_label=post
# ==========================================================================
- name: Diff operational snapshots (before vs after)
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    before_label: before
    after_label: after
    commands_file: "{{ playbook_dir }}/snapshot_commands.txt"
    snapshot_base: "{{ state_dir }}/{{ device_name }}/snapshots"
  tasks:

    - name: Load the command list (skip blanks and '#' comments)
      ansible.builtin.set_fact:
        snapshot_commands: >-
          {{ lookup('file', commands_file).splitlines()
             | map('trim')
             | reject('match', '^#')
             | reject('equalto', '')
             | list }}

    - name: Assert both snapshot directories exist
      ansible.builtin.stat:
        path: "{{ snapshot_base }}/{{ item }}"
      register: snap_dirs
      loop:
        - "{{ before_label }}"
        - "{{ after_label }}"
      delegate_to: localhost
      failed_when: not snap_dirs.stat.exists

    - name: Diff each command's output (before vs after)
      ansible.builtin.command:
        argv:
          - diff
          - -u
          - "{{ snapshot_base }}/{{ before_label }}/{{ _san }}.txt"
          - "{{ snapshot_base }}/{{ after_label }}/{{ _san }}.txt"
      vars:
        _san: "{{ item | regex_replace('[^A-Za-z0-9]+', '_') }}"
      register: diff_results
      loop: "{{ snapshot_commands }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      failed_when: diff_results.rc not in [0, 1]
      delegate_to: localhost

    - name: Collect commands whose output changed
      ansible.builtin.set_fact:
        changed_commands: "{{ diff_results.results | selectattr('rc', 'ne', 0) | list }}"

    - name: Show the differences
      ansible.builtin.debug:
        msg: |-
          ===== {{ device_name }} | changed: {{ item.item }} =====
          {{ item.stdout }}
      loop: "{{ changed_commands }}"
      loop_control:
        label: "{{ item.item }}"
      when: changed_commands | length > 0

    - name: Raise an error if any snapshot differs
      ansible.builtin.assert:
        that:
          - changed_commands | length == 0
        success_msg: >-
          {{ device_name }} | no differences between '{{ before_label }}'
          and '{{ after_label }}' snapshots ({{ snapshot_commands | length }} command(s))
        fail_msg: >-
          {{ device_name }} | differences detected between '{{ before_label }}'
          and '{{ after_label }}' on: {{ changed_commands | map(attribute='item') | list }}
