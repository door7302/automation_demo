---
# ==========================================================================
# rollback_drain.yml  (Option A — manual recovery helper)
#
# Undo a partial or complete "drain" by restoring service in the reverse
# order, then capture an "after" snapshot and diff it against "before".
#
# Use this when guided_upgrade.yml stopped mid-run (a phase failed, or you
# aborted at a gate) and you want to put the device back in service. It is
# safe to run even if only some drain steps were applied — each restore
# playbook is idempotent.
#
#   ansible-playbook playbooks/rollback_drain.yml \
#     -e target_hosts=rtme-mx-25 -e user=regress -e password=secret
# ==========================================================================
- name: Rollback — confirm
  hosts: localhost
  gather_facts: false
  connection: local
  tags: always
  tasks:
    - name: Confirm rollback
      ansible.builtin.pause:
        prompt: |

          About to RESTORE service on {{ target_hosts }}:
            unshut interfaces -> activate routing-instances ->
            activate BGP -> restore ISIS overload -> activate GRES/NSR.

          Press ENTER to roll back, or Ctrl-C then A to abort.

- import_playbook: unshut_interfaces.yml
- import_playbook: activate_ri.yml
- import_playbook: activate_bgp_groups.yml
- import_playbook: restore_isis_overload.yml
- import_playbook: activate_gres_nsr.yml
- import_playbook: check_replication_state.yml
- import_playbook: snapshot.yml
  vars:
    snapshot_label: after
- import_playbook: diff_snapshots.yml
