---
# ==========================================================================
# check_node.yml
# Wait for each device to become reachable over NETCONF (TCP/830 + a live
# RPC), polling every 5 seconds. Stops as soon as the node answers; keeps
# retrying up to a 30-minute deadline and raises an error if still down.
#
#   ansible-playbook playbooks/check_node.yml
#   ansible-playbook playbooks/check_node.yml --limit router1
#
# Tunables (override with -e):
#   probe_interval : seconds between attempts (default 5)
#   probe_timeout  : overall deadline in seconds (default 1800 = 30 min)
# ==========================================================================
- name: Check NETCONF reachability
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    probe_interval: 5
    probe_timeout: 1800
  tasks:

    - name: "{{ device_name }} | Wait for NETCONF TCP port (every {{ probe_interval }}s, up to {{ (probe_timeout / 60) | int }} min)"
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ ansible_port | default(830) }}"
        sleep: "{{ probe_interval }}"
        timeout: "{{ probe_timeout }}"
      delegate_to: localhost

    - name: "{{ device_name }} | NETCONF RPC probe (show version)"
      juniper.device.command:
        commands:
          - show version
      register: probe

    - name: "{{ device_name }} | Result"
      ansible.builtin.debug:
        msg: "{{ device_name }} ({{ model }} / {{ software }}) is REACHABLE via NETCONF"
