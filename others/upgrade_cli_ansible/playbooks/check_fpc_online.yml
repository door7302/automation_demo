---
# ==========================================================================
# check_fpc_online.yml
# Wait for all present FPCs to reach the "Online" state, polling until a
# 30-second deadline. Empty slots (state "Empty") are ignored. As soon as
# every present FPC is Online the play succeeds; if one or more are still
# not Online after the timeout, it raises an error listing the bad slots.
#
#   "show chassis fpc"  (RPC get-fpc-information)
#
#   ansible-playbook playbooks/check_fpc_online.yml
#   ansible-playbook playbooks/check_fpc_online.yml --limit router1
#
# Tunables (override with -e):
#   poll_interval : seconds between attempts (default 5)
#   poll_timeout  : overall deadline in seconds (default 30)
# ==========================================================================
- name: Check all FPCs are Online
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    poll_interval: 5
    poll_timeout: 30
    poll_retries: "{{ (poll_timeout / poll_interval) | int }}"
  tasks:

    - name: Wait until all present FPCs are Online (ignore Empty slots)
      block:

        - name: "{{ device_name }} | Poll FPC states (every {{ poll_interval }}s, max {{ poll_timeout }}s)"
          juniper.device.rpc:
            rpcs: get-fpc-information
            formats: xml
          register: fpc_info
          until: >-
            (( [fpc_info.parsed_output['fpc-information']['fpc']]
               if fpc_info.parsed_output['fpc-information']['fpc'] is mapping
               else fpc_info.parsed_output['fpc-information']['fpc'] )
             | rejectattr('state', 'equalto', 'Empty')
             | rejectattr('state', 'equalto', 'Online')
             | list | length) == 0
          retries: "{{ poll_retries }}"
          delay: "{{ poll_interval }}"

        - name: "{{ device_name }} | Result"
          ansible.builtin.debug:
            msg: >-
              {{ device_name }} | all present FPCs are Online
              (Online:
              {{ (( [fpc_info.parsed_output['fpc-information']['fpc']]
                    if fpc_info.parsed_output['fpc-information']['fpc'] is mapping
                    else fpc_info.parsed_output['fpc-information']['fpc'] )
                  | selectattr('state', 'equalto', 'Online')
                  | map(attribute='slot') | list) }})

      rescue:

        - name: "{{ device_name }} | Collect FPCs that are not Online"
          ansible.builtin.set_fact:
            fpc_not_online: >-
              {{ (( [fpc_info.parsed_output['fpc-information']['fpc']]
                    if fpc_info.parsed_output['fpc-information']['fpc'] is mapping
                    else fpc_info.parsed_output['fpc-information']['fpc'] )
                  | rejectattr('state', 'equalto', 'Empty')
                  | rejectattr('state', 'equalto', 'Online')
                  | list) }}

        - name: "{{ device_name }} | Raise error - FPCs not Online after {{ poll_timeout }}s"
          ansible.builtin.fail:
            msg: >-
              {{ device_name }} | FPC(s) NOT Online after {{ poll_timeout }}s (slot=state):
              {{ dict(fpc_not_online | map(attribute='slot') | list
                      | zip(fpc_not_online | map(attribute='state') | list)) }}
