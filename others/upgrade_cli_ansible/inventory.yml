---
# Inventory of Junos / Junos-Evolved devices.
#
# Per-host facts requested:
#   device_name : logical name of the device
#   ansible_host: IP / FQDN used to reach it over NETCONF
#   user        : login user
#   password    : login password
#   model       : hardware model (informational)
#   software    : "junos" or "evo" (Junos Evolved) (informational)
#
# Connection variables (ansible_connection, ansible_user, ...) are defined
# once in group_vars/junos_devices.yml and derived from user/password below.
all:
  children:
    junos_devices:
      hosts:
        rtme-mx-25:
          device_name: rtme-mx-25.englab.juniper.net
          model: mx480
          software: junos
        rtme-ptx10001-36mr-10:
          device_name: rtme-ptx10001-36mr-10.englab.juniper.net
          model: ptx10008
          software: evo
