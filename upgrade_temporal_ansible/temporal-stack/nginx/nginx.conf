events {}

http {
    # -----------------------------------------------------------------
    # HTTPS reverse proxy in front of the Temporal Web UI.
    #
    # The single browser-facing entry port is 8081 (TLS). We cannot also
    # run a plain-HTTP redirect server on 8081 — one port can serve either
    # HTTP or HTTPS, not both — so 8081 is HTTPS only.
    # -----------------------------------------------------------------
    server {
        listen 8081 ssl;
        server_name localhost;   # <-- change to your server's hostname / cert CN

        # NOTE: server.crt must be a FULLCHAIN (leaf cert followed by the
        # intermediate CA chain). nginx does not send intermediates otherwise,
        # which browsers report as an untrusted / incomplete chain.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://temporal-ui:8090;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / connection upgrade support
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
