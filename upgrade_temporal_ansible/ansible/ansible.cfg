[defaults]
# Inventory is generated per-run from the Temporal JSON input and passed with
# `-i`, so no static `inventory =` default is set here.
host_key_checking = False
retry_files_enabled = False
gathering = explicit
# YAML-formatted task output via the ansible-core `default` callback. (The
# community.general `yaml` callback was removed in community.general 12.0.0 and
# doesn't support ansible-core 2.17 — it is superseded by this option.)
stdout_callback = default
result_format = yaml

[persistent_connection]
command_timeout = 60
connect_timeout = 30
