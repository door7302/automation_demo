---
# ==========================================================================
# check_replication_state.yml
# Wait for stateful (GRES/NSR) replication to become fully synchronized,
# polling periodically up to a maximum timeout:
#
#   1. "show task replication"  (RPC get-routing-task-replication-state)
#      -> every protocol in the list must be in state "Complete"
#         (the protocol list can vary: BGP, IS-IS, MPLS, LDP, ...).
#
#   2. "show bgp replication"   (RPC get-bgp-replication-information)
#      -> bgp-rsync-rt-state must be "Complete".
#
# The play exits as soon as both conditions are Complete. If replication is
# still not Complete after the deadline, it raises an error with details.
#
#   ansible-playbook playbooks/check_replication_state.yml
#   ansible-playbook playbooks/check_replication_state.yml --limit router1
#
# Tunables (override with -e):
#   poll_interval : seconds between attempts (default 30)
#   poll_timeout  : overall deadline in seconds (default 1800 = 30 min)
# ==========================================================================
- name: Check stateful replication state
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    poll_interval: 30
    poll_timeout: 1800
    poll_retries: "{{ (poll_timeout / poll_interval) | int }}"
  tasks:

    - name: Wait until replication is fully Complete
      block:

        - name: "{{ device_name }} | Poll task replication (every {{ poll_interval }}s, max {{ (poll_timeout / 60) | int }} min)"
          juniper.device.rpc:
            # Local (in-process PyEZ) mode. Over the persistent pyez connection
            # the module's get_rpc() path is broken with the installed
            # ansible-core (returns no parsed_output / UnboundLocalError), which
            # makes the until conditional crash. Local mode calls the RPC
            # directly (same fix as the other check_* playbooks).
            host: "{{ ansible_host | default(device_name) }}"
            user: "{{ ansible_user }}"
            passwd: "{{ ansible_password | default(omit) }}"
            port: "{{ ansible_port | default(830) }}"
            rpcs: get-routing-task-replication-state
            formats: xml
          vars:
            ansible_connection: local
          register: taskrep
          # Passes when GRES/stateful replication is Disabled (nothing to sync
          # on this box) or when every replicated protocol is 'Complete'.
          until: >-
            taskrep.parsed_output is defined
            and (
              (taskrep.parsed_output.get('task-replication-state', {}).get('task-gres-state') == 'Disabled')
              or ((
                    [taskrep.parsed_output['task-replication-state']['task-protocol-replication']]
                    if taskrep.parsed_output.get('task-replication-state', {}).get('task-protocol-replication') is mapping
                    else taskrep.parsed_output.get('task-replication-state', {}).get('task-protocol-replication', [])
                  )
                  | rejectattr('task-protocol-replication-state', 'equalto', 'Complete')
                  | list | length) == 0
            )
          retries: "{{ poll_retries }}"
          delay: "{{ poll_interval }}"

        - name: "{{ device_name }} | Poll BGP replication (every {{ poll_interval }}s, max {{ (poll_timeout / 60) | int }} min)"
          juniper.device.rpc:
            host: "{{ ansible_host | default(device_name) }}"
            user: "{{ ansible_user }}"
            passwd: "{{ ansible_password | default(omit) }}"
            port: "{{ ansible_port | default(830) }}"
            rpcs: get-bgp-replication-information
            formats: xml
          vars:
            ansible_connection: local
          register: bgprep
          # Only check BGP replication when stateful (GRES/NSR) replication is
          # enabled. When NSR is not configured, stateful replication is
          # Disabled and BGP synchronization never leaves 'NotStarted', so
          # polling it would always time out.
          when: >-
            taskrep.parsed_output.get('task-replication-state', {}).get('task-gres-state') != 'Disabled'
          # Passes when BGP is not running (no bgp-sync-information block) or
          # when the master RT sync state is 'Complete'.
          until: >-
            bgprep.parsed_output is defined
            and (
              ('bgp-sync-information' not in bgprep.parsed_output)
              or (bgprep.parsed_output.get('bgp-sync-information', {})
                    .get('bgp-rsync-master', {})
                    .get('bgp-rsync-rt-state') == 'Complete')
            )
          retries: "{{ poll_retries }}"
          delay: "{{ poll_interval }}"

        - name: "{{ device_name }} | Result"
          ansible.builtin.debug:
            msg: >-
              {{ device_name }} | replication OK
              (gres={{ taskrep.parsed_output.get('task-replication-state', {}).get('task-gres-state', 'n/a') }},
              bgp-rsync-rt-state={{ ((bgprep | default({})).parsed_output | default({}, true)).get('bgp-sync-information', {}).get('bgp-rsync-master', {}).get('bgp-rsync-rt-state', 'n/a (stateful replication disabled or BGP not running)') }})

      rescue:

        - name: "{{ device_name }} | Collect protocols not Complete"
          ansible.builtin.set_fact:
            protocols_not_complete: >-
              {{ (( [taskrep.parsed_output['task-replication-state']['task-protocol-replication']]
                    if taskrep.parsed_output.get('task-replication-state', {}).get('task-protocol-replication') is mapping
                    else taskrep.parsed_output.get('task-replication-state', {}).get('task-protocol-replication', []) )
                  | rejectattr('task-protocol-replication-state', 'equalto', 'Complete')
                  | map(attribute='task-protocol-replication-name') | list)
                 if taskrep.parsed_output is defined else ['unknown (no parseable RPC output)'] }}
            bgp_rt_state: >-
              {{ ((bgprep | default({})).parsed_output | default({}, true))
                  .get('bgp-sync-information', {})
                  .get('bgp-rsync-master', {})
                  .get('bgp-rsync-rt-state', 'unknown') }}

        - name: "{{ device_name }} | Raise error - replication NOT complete after {{ (poll_timeout / 60) | int }} min"
          ansible.builtin.fail:
            msg: >-
              {{ device_name }} | replication NOT complete after
              {{ (poll_timeout / 60) | int }} min ->
              protocols not Complete: {{ protocols_not_complete }},
              bgp-rsync-rt-state: {{ bgp_rt_state }}
