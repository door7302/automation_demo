---
# ==========================================================================
# check_routing_engines.yml
# Wait for every Routing Engine to be healthy (status == "OK"), polling
# every 30 seconds up to a 30-minute deadline. As soon as all REs are OK
# the play succeeds; if one or more are still not OK after the timeout it
# raises an error listing the bad slots.
#
#   "show chassis routing-engine"  (RPC get-route-engine-information)
#
#   ansible-playbook playbooks/check_routing_engines.yml
#   ansible-playbook playbooks/check_routing_engines.yml --limit router1
#
# Tunables (override with -e):
#   poll_interval : seconds between attempts (default 30)
#   poll_timeout  : overall deadline in seconds (default 1800 = 30 min)
# ==========================================================================
- name: Check all Routing Engines are up and running
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    poll_interval: 30
    poll_timeout: 1800
    poll_retries: "{{ (poll_timeout / poll_interval) | int }}"
  tasks:

    - name: Wait until all Routing Engines are OK
      block:

        - name: "{{ device_name }} | Poll RE states (every {{ poll_interval }}s, max {{ (poll_timeout / 60) | int }} min)"
          juniper.device.rpc:
            rpcs: get-route-engine-information
            formats: xml
          register: re_info
          until: >-
            (( [re_info.parsed_output['route-engine-information']['route-engine']]
               if re_info.parsed_output['route-engine-information']['route-engine'] is mapping
               else re_info.parsed_output['route-engine-information']['route-engine'] )
             | rejectattr('status', 'equalto', 'OK')
             | list | length) == 0
          retries: "{{ poll_retries }}"
          delay: "{{ poll_interval }}"

        - name: "{{ device_name }} | Result"
          ansible.builtin.debug:
            msg: >-
              {{ device_name }} | all Routing Engine(s) are OK
              (slots:
              {{ (( [re_info.parsed_output['route-engine-information']['route-engine']]
                    if re_info.parsed_output['route-engine-information']['route-engine'] is mapping
                    else re_info.parsed_output['route-engine-information']['route-engine'] )
                  | map(attribute='slot') | list) }})

      rescue:

        - name: "{{ device_name }} | Collect Routing Engines that are not OK"
          ansible.builtin.set_fact:
            re_not_ok: >-
              {{ (( [re_info.parsed_output['route-engine-information']['route-engine']]
                    if re_info.parsed_output['route-engine-information']['route-engine'] is mapping
                    else re_info.parsed_output['route-engine-information']['route-engine'] )
                  | rejectattr('status', 'equalto', 'OK')
                  | list) }}

        - name: "{{ device_name }} | Raise error - Routing Engine(s) not OK after {{ (poll_timeout / 60) | int }} min"
          ansible.builtin.fail:
            msg: >-
              {{ device_name }} | Routing Engine(s) NOT OK after
              {{ (poll_timeout / 60) | int }} min (slot=status):
              {{ dict(re_not_ok | map(attribute='slot') | list
                      | zip(re_not_ok | map(attribute='status') | list)) }}
