---
# Official Juniper Networks Ansible collection (PyEZ based).
# Install with:  ansible-galaxy collection install -r requirements.yml
# Pinned to 1.0.7 (verified-good). Needs ansible-core >= 2.16.6 for the pyez
# connection fix.
collections:
  - name: juniper.device
    version: "==1.0.7"
  # Provides the `yaml` stdout callback referenced in ansible.cfg
  # (stdout_callback = yaml). ansible-core bundles no collections, so on a
  # fresh venv this must be installed explicitly or ansible aborts with
  # "Invalid callback for stdout specified: yaml".
  - name: community.general
    version: ">=8.0.0"
