name: temporal-stack-ansible

# Base Temporal dev stack (PostgreSQL + Temporal + Web UI).
#
# This file is mode-agnostic and is always combined with ONE override:
#   HTTP  : docker compose -f docker-compose.yml -f docker-compose.http.yml  up -d
#   HTTPS : docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#
# Your Python worker runs on the HOST and connects to temporal on
# localhost:7233 (published below).


services:
  postgresql:
    container_name: temporal-ansible-postgresql
    image: postgres:${POSTGRESQL_VERSION:-16}
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    networks:
      - temporal-network
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    expose:
      - 5432

  temporal:
    container_name: temporal-ansible
    image: temporalio/auto-setup:${TEMPORAL_VERSION:-latest}
    depends_on:
      - postgresql
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    networks:
      - temporal-network
    ports:
      - "7233:7233"        # gRPC endpoint your host worker connects to

  temporal-admin-tools:
    container_name: temporal-ansible-admin-tools
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION:-latest}
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    tty: true

  temporal-ui:
    container_name: temporal-ansible-ui
    image: temporalio/ui:${TEMPORAL_UI_VERSION:-latest}
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      # The UI listens on 8090 inside the container (8080 is taken on the host).
      # Browser-facing entry port is always 8081 (see overrides).
      TEMPORAL_UI_PORT: 8090
      # Default suits HTTP mode; the https override changes this.
      TEMPORAL_CORS_ORIGINS: http://localhost:8081
    networks:
      - temporal-network
    expose:
      - 8090       # published on 8081 (http) or proxied by nginx (https)

networks:
  temporal-network:
    driver: bridge
    name: temporal-ansible-network

volumes:
  temporal-pgdata:
