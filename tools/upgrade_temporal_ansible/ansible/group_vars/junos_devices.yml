---
# --------------------------------------------------------------------------
# Connection: NETCONF over SSH through Juniper PyEZ
# --------------------------------------------------------------------------
ansible_connection: juniper.device.pyez
# Connect to the device's FQDN (held in device_name) so it resolves both on
# the controller and inside the AWX execution-environment pod (whose DNS has
# no englab search domain). Override per-host with ansible_host if needed.
ansible_host: "{{ device_name }}"
ansible_user: "{{ user }}"
ansible_password: "{{ password }}"
ansible_port: 830
ansible_python_interpreter: "{{ ansible_playbook_python }}"

# --------------------------------------------------------------------------
# Where per-device state files are stored (one sub-folder per device_name).
# Resolves to <repo>/state regardless of where ansible-playbook is launched.
# --------------------------------------------------------------------------
state_dir: "{{ playbook_dir | dirname }}/state"

# --------------------------------------------------------------------------
# Defaults — override on the command line with --extra-vars / -e
# --------------------------------------------------------------------------

# Interfaces / BGP groups / routing-instances that must NEVER be touched.
interface_whitelist: []
bgp_group_whitelist: []
ri_whitelist: []

# ISIS overload options (all disabled by default).
overload_advertise_high_metrics: false
overload_allow_route_leaking: false
overload_external_prefixes: false
overload_internal_prefixes: false

# GRES / NSR knobs checked & deactivated by deactivate_gres_nsr.yml.
gres_nsr_knobs:
  - "routing-options nonstop-routing"
  - "protocols layer2-control nonstop-bridging"
  - "chassis redundancy graceful-switchover"
