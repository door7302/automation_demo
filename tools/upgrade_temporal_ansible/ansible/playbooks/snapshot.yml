---
# ==========================================================================
# snapshot.yml
# Capture a point-in-time snapshot of a list of operational "show" commands
# (read from an external file) and store one text file per command on the
# Ansible controller. Run it once BEFORE a change and once AFTER, using a
# different "snapshot_label" each time, then compare with diff_snapshots.yml.
#
# Snapshots are stored under:
#   <repo>/state/<device_name>/snapshots/<snapshot_label>/<command>.txt
#
# Required extra-vars:
#   snapshot_label : label for this capture (e.g. "before" or "after")
#
# Optional:
#   commands_file  : file with one show command per line
#                    (default playbooks/snapshot_commands.txt)
#
# Examples:
#   ansible-playbook playbooks/snapshot.yml -e snapshot_label=before
#   ansible-playbook playbooks/snapshot.yml -e snapshot_label=after --limit router1
# ==========================================================================
- name: Capture operational snapshot
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    commands_file: "{{ playbook_dir }}/snapshot_commands.txt"
    snapshot_base: "{{ state_dir }}/{{ device_name }}/snapshots"
    snapshot_dir: "{{ snapshot_base }}/{{ snapshot_label }}"
  tasks:

    - name: Validate snapshot_label is provided
      ansible.builtin.assert:
        that:
          - snapshot_label is defined and snapshot_label | length > 0
        fail_msg: "You must pass -e snapshot_label=<before|after|...>"
      run_once: true
      delegate_to: localhost

    - name: Load the command list (skip blanks and '#' comments)
      ansible.builtin.set_fact:
        snapshot_commands: >-
          {{ lookup('file', commands_file).splitlines()
             | map('trim')
             | reject('match', '^#')
             | reject('equalto', '')
             | list }}

    - name: Ensure the snapshot directory exists
      ansible.builtin.file:
        path: "{{ snapshot_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Run the snapshot commands
      juniper.device.command:
        # Force local (in-process PyEZ) mode: over the persistent pyez
        # connection the command module routes through get_rpc()/__rpc__,
        # which can fail serializing some replies ("Type 'bool' cannot be
        # serialized"). Running locally uses dev.rpc() directly and avoids it.
        host: "{{ ansible_host | default(device_name) }}"
        user: "{{ ansible_user }}"
        passwd: "{{ ansible_password | default(omit) }}"
        port: "{{ ansible_port | default(830) }}"
        commands: "{{ item }}"
        format: text
      vars:
        ansible_connection: local
      loop: "{{ snapshot_commands }}"
      loop_control:
        label: "{{ item }}"
      register: snap

    - name: Save each command output to its own file
      ansible.builtin.copy:
        content: "{{ item.stdout | default('') }}\n"
        dest: "{{ snapshot_dir }}/{{ item.item | regex_replace('[^A-Za-z0-9]+', '_') }}.txt"
        mode: "0644"
      loop: "{{ snap.results }}"
      loop_control:
        label: "{{ item.item }}"
      delegate_to: localhost

    - name: Snapshot summary
      ansible.builtin.debug:
        msg: >-
          {{ device_name }} | captured {{ snapshot_commands | length }} command(s)
          into {{ snapshot_dir }} (label='{{ snapshot_label }}')
