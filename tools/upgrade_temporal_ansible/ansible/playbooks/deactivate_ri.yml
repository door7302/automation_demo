---
# ==========================================================================
# deactivate_ri.yml
# Deactivate ("deactivate routing-instances <name>") every routing-instance
# that is currently active. Already-deactivated and whitelisted instances are
# skipped. Deactivated instances are appended to a per-device state file.
#
#   ansible-playbook playbooks/deactivate_ri.yml \
#       -e '{"ri_whitelist": ["mgmt_junos", "VRF-CORE"]}'
# ==========================================================================
- name: Deactivate routing-instances
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    statefile: "{{ state_dir }}/{{ device_name }}/routing_instances.json"
    lo0_statefile: "{{ state_dir }}/{{ device_name }}/routing_instances_lo0.json"
  tasks:

    - name: Retrieve committed configuration (set format)
      juniper.device.config:
        retrieve: committed
        format: set
        return_output: true
      register: cfg

    - name: Parse routing-instances
      ansible.builtin.set_fact:
        _all_ri: "{{ cfg.config | regex_findall('(?m)^set routing-instances (\\S+)') | unique }}"
        _deact_ri: "{{ cfg.config | regex_findall('(?m)^deactivate routing-instances (\\S+)\\s*$') | unique }}"

    - name: Compute routing-instances to deactivate
      ansible.builtin.set_fact:
        target_ri: >-
          {{ _all_ri
             | difference(_deact_ri)
             | difference(ri_whitelist)
             | list }}

    - name: Show what will be deactivated
      ansible.builtin.debug:
        msg: "{{ device_name }} | routing-instances to deactivate: {{ target_ri }}"

    - name: Compute the loopback (lo0) units bound to those routing-instances
      vars:
        _ri_alt: "{{ target_ri | map('regex_escape') | join('|') }}"
      ansible.builtin.set_fact:
        # A routing-instance that binds a lo0 unit cannot simply be
        # deactivated: the orphaned unit falls into the master instance and
        # Junos rejects the commit ("Multiple loopback interfaces not
        # permitted in master routing instance"). We must deactivate those
        # units in the SAME atomic commit as their routing-instance.
        target_lo0_units: >-
          {{ (cfg.config
              | regex_findall('(?m)^set routing-instances (?:' ~ _ri_alt ~ ') interface (lo0\.\d+)')
              | unique | list) if (target_ri | length > 0) else [] }}

    - name: Build the deactivation command set (routing-instances + their lo0 units)
      ansible.builtin.set_fact:
        deact_lines: >-
          {{ (target_ri
              | map('regex_replace', '^(.+)$', 'deactivate routing-instances \1') | list)
             + (target_lo0_units
              | map('regex_replace', '^lo0\.(\d+)$', 'deactivate interfaces lo0 unit \1') | list) }}
      when: target_ri | length > 0

    - name: Deactivate the routing-instances (and their loopback units)
      juniper.device.config:
        load: set
        lines: "{{ deact_lines }}"
        commit: true
        comment: "Ansible deactivate_ri"
      when: target_ri | length > 0

    - name: Persist state (only when something was deactivated)
      when: target_ri | length > 0
      block:
        - name: Ensure state directory exists
          ansible.builtin.file:
            path: "{{ statefile | dirname }}"
            state: directory
            mode: "0755"
          delegate_to: localhost

        - name: Read previously saved list (if any)
          ansible.builtin.stat:
            path: "{{ statefile }}"
          register: st
          delegate_to: localhost

        - name: Merge and store the deactivated routing-instance list
          ansible.builtin.copy:
            content: "{{ ((lookup('file', statefile) | from_json) if st.stat.exists else []) | union(target_ri) | to_nice_json }}"
            dest: "{{ statefile }}"
            mode: "0644"
          delegate_to: localhost

        - name: Read previously saved lo0-unit list (if any)
          ansible.builtin.stat:
            path: "{{ lo0_statefile }}"
          register: st_lo0
          delegate_to: localhost

        - name: Merge and store the deactivated lo0-unit list
          ansible.builtin.copy:
            content: "{{ ((lookup('file', lo0_statefile) | from_json) if st_lo0.stat.exists else []) | union(target_lo0_units) | to_nice_json }}"
            dest: "{{ lo0_statefile }}"
            mode: "0644"
          delegate_to: localhost
