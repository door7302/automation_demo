---
# ==========================================================================
# reboot.yml
# Reboot a Junos / Junos-Evolved device, or a specific Routing Engine.
#
# Uses juniper.device.system (action: reboot). RE targeting:
#   re_target: both   -> reboot ALL REs            (all_re: true)   [default]
#              local  -> reboot only the RE this play is connected to
#                                                   (all_re: false, other_re: false)
#              other  -> reboot only the OTHER RE  (other_re: true)
#
# vmhost reboot (request vmhost reboot):
#   By default this is AUTO-DETECTED from the release image name: if
#   release_file contains "vmhost", a vmhost reboot is performed (needed on
#   vmhost-based REs to reboot the host OS as well). Force it on/off with
#   -e vmhost=true / -e vmhost=false.
#
# Optional scheduling:
#   in_min : reboot in N minutes
#   at     : reboot at a specific time ("hh:mm" or "yyyymmddhhmm")
#
# A failed reboot request fails the play (error is raised).
#
# Examples:
#   ansible-playbook playbooks/reboot.yml --limit router1
#   ansible-playbook playbooks/reboot.yml --limit router1 -e re_target=other
#   ansible-playbook playbooks/reboot.yml --limit router1 -e re_target=local
#   ansible-playbook playbooks/reboot.yml --limit router1 -e vmhost=true
#   ansible-playbook playbooks/reboot.yml --limit router1 -e in_min=5
# ==========================================================================
- name: Reboot device or a given Routing Engine
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    re_target: both
    # Default to a vmhost reboot when the staged image is a vmhost image
    # (auto-detected from the release filename). Override with -e vmhost=...
    vmhost: "{{ 'vmhost' in (release_file | default('') | lower) }}"
    # in_min / at are intentionally left undefined by default.
    reboot_all_re: "{{ re_target == 'both' }}"
    reboot_other_re: "{{ re_target == 'other' }}"
  tasks:

    - name: Validate re_target
      ansible.builtin.assert:
        that:
          - re_target in ['both', 'local', 'other']
        fail_msg: "re_target must be one of: both | local | other (got '{{ re_target }}')"
      run_once: true
      delegate_to: localhost

    - name: Reboot plan
      ansible.builtin.debug:
        msg:
          - "device   : {{ device_name }}"
          - "platform  : {{ 'EVO' if (software | default('junos')) | lower == 'evo' else 'Junos' }}"
          - "target    : {{ re_target }} (all_re={{ reboot_all_re }}, other_re={{ reboot_other_re }})"
          - "vmhost    : {{ vmhost }}"
          - "when      : {{ ('in ' ~ in_min ~ ' min') if in_min is defined else (('at ' ~ at) if at is defined else 'now') }}"

    - name: Request reboot
      juniper.device.system:
        action: reboot
        # all_re and other_re are mutually exclusive in the module: only ever
        # pass ONE of them. both -> all_re:true, local -> all_re:false,
        # other -> other_re:true (all_re omitted).
        all_re: "{{ reboot_all_re if re_target != 'other' else omit }}"
        other_re: "{{ true if re_target == 'other' else omit }}"
        vmhost: "{{ vmhost }}"
        in_min: "{{ in_min | default(omit) }}"
        at: "{{ at | default(omit) }}"
      register: reboot_result

    - name: Reboot result
      ansible.builtin.debug:
        msg: "{{ device_name }} | {{ reboot_result.msg | default('reboot requested') }}"
