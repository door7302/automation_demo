---
# ==========================================================================
# activate_gres_nsr.yml
# Re-activate ("activate <knob>") the HA knobs that were deactivated by
# deactivate_gres_nsr.yml, then clear the state file.
# ==========================================================================
- name: Activate GRES / NSR / NSB
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    statefile: "{{ state_dir }}/{{ device_name }}/gres_nsr.json"
  tasks:

    - name: Read saved deactivated knob list
      ansible.builtin.stat:
        path: "{{ statefile }}"
      register: st
      delegate_to: localhost

    - name: Load saved knobs
      ansible.builtin.set_fact:
        saved_knobs: "{{ (lookup('file', statefile) | from_json) if st.stat.exists else [] }}"

    - name: Nothing to do
      ansible.builtin.debug:
        msg: "{{ device_name }} | no saved deactivated HA knobs"
      when: saved_knobs | length == 0

    - name: Re-activate the knobs
      juniper.device.config:
        load: set
        lines: "{{ saved_knobs | map('regex_replace', '^(.+)$', 'activate \\1') | list }}"
        commit: true
        comment: "Ansible activate_gres_nsr"
      when: saved_knobs | length > 0

    - name: Clear the state file
      ansible.builtin.file:
        path: "{{ statefile }}"
        state: absent
      delegate_to: localhost
      when: saved_knobs | length > 0
