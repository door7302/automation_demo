---
# ==========================================================================
# set_isis_overload.yml
# 1. Save the currently configured "protocols isis overload" stanza so it can
#    be restored later (restore_isis_overload.yml).
# 2. Remove any existing overload config.
# 3. Configure "set protocols isis overload" with optional sub-options
#    (all disabled by default).
#
# Options (booleans, default false):
#   overload_advertise_high_metrics  -> advertise-high-metrics
#   overload_allow_route_leaking     -> allow-route-leaking
#   overload_external_prefixes       -> external-prefixes
#   overload_internal_prefixes       -> internal-prefixes
#
#   ansible-playbook playbooks/set_isis_overload.yml \
#       -e overload_advertise_high_metrics=true -e overload_internal_prefixes=true
# ==========================================================================
- name: Set ISIS overload
  hosts: "{{ target_hosts | default('junos_devices') }}"
  connection: juniper.device.pyez
  gather_facts: false
  vars:
    statefile: "{{ state_dir }}/{{ device_name }}/isis_overload.json"
  tasks:

    - name: Retrieve committed configuration (set format)
      juniper.device.config:
        retrieve: committed
        format: set
        return_output: true
      register: cfg

    - name: Capture existing overload configuration
      ansible.builtin.set_fact:
        existing_overload: "{{ cfg.config | regex_findall('(?m)^set protocols isis overload.*$') }}"

    - name: Save existing overload configuration to state file
      block:
        - name: Ensure state directory exists
          ansible.builtin.file:
            path: "{{ statefile | dirname }}"
            state: directory
            mode: "0755"
          delegate_to: localhost

        - name: Write state file
          ansible.builtin.copy:
            content: "{{ existing_overload | to_nice_json }}"
            dest: "{{ statefile }}"
            mode: "0644"
          delegate_to: localhost

    - name: Build new overload configuration
      ansible.builtin.set_fact:
        new_overload: >-
          {{ ['set protocols isis overload']
             + (['set protocols isis overload advertise-high-metrics'] if overload_advertise_high_metrics | bool else [])
             + (['set protocols isis overload allow-route-leaking']    if overload_allow_route_leaking    | bool else [])
             + (['set protocols isis overload external-prefixes']      if overload_external_prefixes      | bool else [])
             + (['set protocols isis overload internal-prefixes']      if overload_internal_prefixes      | bool else []) }}

    - name: Apply overload configuration (delete old, then set new)
      juniper.device.config:
        load: set
        lines: "{{ (['delete protocols isis overload'] if existing_overload | length > 0 else []) + new_overload }}"
        commit: true
        comment: "Ansible set_isis_overload"
